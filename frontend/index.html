<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityPulse - AI-Powered Civic Intelligence for Mumbai</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                    <path d="M2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
                <span class="brand-name">CityPulse</span>
            </div>
            <div class="nav-links">
                <a href="#home" class="nav-link active">Home</a>
                <a href="#features" class="nav-link">Features</a>
                <a href="#alerts" class="nav-link">Alerts</a>
                <a href="#insights" class="nav-link">Insights</a>
                <a href="#qa" class="nav-link">Ask AI</a>
            </div>
            <div class="nav-actions">
                <button class="notification-btn" id="notificationBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                    </svg>
                    <span class="notification-badge" id="notificationBadge">0</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="home" class="hero">
        <div class="container">
            <div class="hero-content">
                <div class="hero-badge">
                    <span class="badge-dot"></span>
                    Powered by Amazon Nova AI
                </div>
                <h1 class="hero-title">
                    Your City's Intelligence,<br>
                    <span class="gradient-text">Powered by AI</span>
                </h1>
                <p class="hero-description">
                    Real-time civic intelligence for Mumbai. Get instant alerts, safety updates, 
                    investment insights, and community trends—all powered by advanced AI.
                </p>
                <div class="hero-actions">
                    <button class="btn btn-primary" onclick="scrollToSection('qa')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <circle cx="11" cy="11" r="8"/>
                            <path d="m21 21-4.35-4.35"/>
                        </svg>
                        Ask AI Anything
                    </button>
                    <button class="btn btn-secondary" onclick="scrollToSection('features')">
                        Explore Features
                    </button>
                </div>
                <div class="hero-stats">
                    <div class="stat">
                        <div class="stat-value" id="alertCount">0</
